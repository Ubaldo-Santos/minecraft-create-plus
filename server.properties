# =============================================================================
# Minecraft Server Properties
# Create+ Compatible | MC 1.19.2 | Forge 43.5.1
# =============================================================================

# --- Network ---
server-port=25565
server-ip=
network-compression-threshold=256
rate-limit=0

# --- World ---
level-name=world
level-type=minecraft\:normal
level-seed=
max-world-size=10000
generate-structures=true

# --- Players ---
max-players=6
white-list=false
enforce-whitelist=false
online-mode=true
pvp=true
allow-flight=true
player-idle-timeout=15

# --- Performance (tuned for Raspberry Pi) ---
view-distance=6
simulation-distance=5
entity-broadcast-range-percentage=75
max-chained-neighbor-updates=100000
sync-chunk-writes=false

# --- Server ---
motd=\u00a76Create+ Server \u00a77| \u00a7aForge 1.19.2
difficulty=normal
gamemode=survival
force-gamemode=false
hardcore=false
spawn-protection=0
enable-command-block=true
allow-nether=true
spawn-npcs=true
spawn-animals=true
spawn-monsters=true

# --- Voice Chat (Simple Voice Chat uses port 24454/UDP by default) ---
# Make sure to expose UDP port 24454 in Docker

# --- RCON (optional, for remote management) ---
enable-rcon=false
rcon.port=25575
rcon.password=

# --- Misc ---
enable-status=true
hide-online-players=false
enable-query=false
prevent-proxy-connections=false
